apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  creationTimestamp: null
  name: modelrepositories.aitrigram.cliver-project.github.io
spec:
  group: aitrigram.cliver-project.github.io
  names:
    kind: ModelRepository
    listKind: ModelRepositoryList
    plural: modelrepositories
    singular: modelrepository
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          ModelRepository is the Schema for the modelrepositories API
          ModelRepository is a cluster wide CRD so that models can be shared across namespaces.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelRepositorySpec defines the desired state of ModelRepository
            properties:
              autoDownload:
                default: true
                description: AutoDownload indicates whether to automatically download
                  the model
                type: boolean
              deleteScripts:
                description: |-
                  DeleteScripts specifies custom scripts to run for deleting the model when the ModelRepository is deleted
                  If not specified, default scripts will be used based on the source origin

                  It supports Jinja2 template variables: {{ ModelId }}, {{ ModelName }}, {{ MountPath }}
                  Can be either bash or Python script (auto-detected)
                type: string
              downloadImage:
                description: |-
                  DownloadImage specifies the container image to use for downloading the model
                  If not specified, a default image will be selected based on the source origin
                type: string
              downloadScripts:
                description: |-
                  DownloadScripts specifies custom scripts to run for downloading the model
                  If not specified, default scripts will be used based on the source origin

                  It supports Jinja2 template variables: {{ ModelId }}, {{ ModelName }}, {{ MountPath }}
                  Can be either bash or Python script (auto-detected)
                type: string
              modelName:
                description: |-
                  ModelName is the identifier within all ModelRepositories in the cluster
                  If not specified, defaults to metadata.name
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector specifies node selector requirements for scheduling download and cleanup jobs
                  This is particularly important when using the storages which needs to ensure jobs run on the correct nodes
                  Example: {"kubernetes.io/hostname": "kind-control-plane"}
                type: object
              source:
                description: Source defines where to download the model from
                properties:
                  hfTokenSecret:
                    description: |-
                      HFTokenSecret is the name of the secret containing the HuggingFace token
                      The secret should exist in the controller's namespace
                      Only used when origin is "huggingface"
                    type: string
                  hfTokenSecretKey:
                    default: HFToken
                    description: |-
                      HFTokenSecretKey is the key within the secret that contains the HuggingFace token
                      Defaults to "HFToken" if not specified
                      Only used when HFTokenSecret is specified
                    type: string
                  modelId:
                    description: ModelId is the identifier of the model within the
                      origin
                    type: string
                  origin:
                    default: huggingface
                    description: Origin specifies the source origin (huggingface,
                      ollama)
                    enum:
                    - huggingface
                    - ollama
                    type: string
                  revision:
                    description: |-
                      Revision is the current active revision to download and serve
                      For HuggingFace: git ref (branch, tag, or commit hash), defaults to "main"
                      For Ollama: model tag (e.g., "0.5b", "7b"), defaults to "latest"
                    type: string
                  revisions:
                    description: |-
                      Revisions is a list of additional revisions to track and maintain
                      Each revision will be downloaded and stored separately alongside the current revision
                    items:
                      description: RevisionReference references a specific model revision
                      properties:
                        name:
                          description: Name is a user-friendly name for this revision
                            (e.g., "v1.0.0", "stable")
                          type: string
                        ref:
                          description: |-
                            Ref is the actual reference (tag, branch, or commit hash)
                            For HuggingFace: git ref
                            For other sources: version identifier
                          type: string
                      required:
                      - name
                      - ref
                      type: object
                    type: array
                required:
                - modelId
                type: object
              storage:
                description: |-
                  Storage configuration for the model
                  This defines where and how the model files are stored, the LLMEngine may have different storage than this one, although it has option to reuse this storage.
                properties:
                  mountPath:
                    default: /data/models
                    description: |-
                      MountPath is the path where models will be stored/mounted inside containers
                      Defaults to /data/models if not specified
                      The data of this Model is normally under this path
                    type: string
                  size:
                    default: 10Gi
                    description: Size of the storage volume (e.g., "50Gi", "100Gi")
                    type: string
                  storageClass:
                    default: auto
                    description: |-
                      StorageClass specifies which Kubernetes StorageClass to use for the PVC
                      Options:
                        - "auto" (default): Auto-detect the best available StorageClass (prefers RWX, then default SC, then RWO)
                        - "<storageclass-name>": Use a specific Kubernetes StorageClass by name (e.g., "longhorn", "nfs-client", "standard")
                      The controller creates a PVC with the appropriate access mode (RWX or RWO) based on the StorageClass provisioner.
                    type: string
                type: object
            required:
            - source
            - storage
            type: object
          status:
            description: ModelRepositoryStatus defines the observed state of ModelRepository
            properties:
              availableRevisions:
                description: |-
                  AvailableRevisions lists all downloaded and available revisions
                  Only populated when spec.source.revisions is specified
                items:
                  description: RevisionStatus describes a specific revision's state
                  properties:
                    commitHash:
                      description: CommitHash is the immutable reference (git commit
                        for HF)
                      type: string
                    name:
                      description: Name is the user-friendly name
                      type: string
                    status:
                      description: Status is the current status of this revision
                      enum:
                      - Pending
                      - Downloading
                      - Ready
                      - Failed
                      - Deprecated
                      type: string
                  required:
                  - name
                  - status
                  type: object
                type: array
              conditions:
                description: Conditions represent the latest available observations
                  of the ModelRepository's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastUpdated:
                description: LastUpdated is the timestamp of the last status update
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  phase
                type: string
              phase:
                description: Phase represents the current phase of the model repository
                enum:
                - Pending
                - Downloading
                - Ready
                - Failed
                - Deprecated
                type: string
              storage:
                description: |-
                  Storage contains detailed information about provisioned storage
                  Only populated after storage is successfully provisioned
                properties:
                  accessMode:
                    description: AccessMode is the volume access mode (ReadWriteMany,
                      ReadWriteOnce)
                    type: string
                  backendRef:
                    description: |-
                      BackendRef contains backend-specific reference information
                      This allows workloads in different namespaces to mount the same storage
                    properties:
                      details:
                        additionalProperties:
                          type: string
                        description: |-
                          Details contains backend-specific reference information as key-value pairs
                          Common keys:
                            For PVC: "pvcName", "pvcNamespace"
                            For NFS: "server", "path"
                            For HostPath: "path"
                            For CephFS: "monitors", "path"
                        type: object
                      type:
                        description: Type is the actual backend storage type detected
                          from the PV (e.g., "nfs", "cephfs", "longhorn", "csi", "ebs")
                        type: string
                    type: object
                  boundNodeName:
                    description: BoundNodeName for node-bound storage (HostPath, RWO
                      PVCs)
                    type: string
                  capacity:
                    description: Capacity is the total storage capacity
                    type: string
                  storageClass:
                    description: StorageClass is the actual storage class used (nfs,
                      hostpath, custom name)
                    type: string
                  volumeMode:
                    default: Filesystem
                    description: VolumeMode is the volume mode (Filesystem, Block)
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
