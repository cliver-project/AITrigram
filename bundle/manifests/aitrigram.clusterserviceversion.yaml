apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "aitrigram.cliver-project.github.io/v1",
          "kind": "LLMEngine",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "aitrigram"
            },
            "name": "ollama-engine"
          },
          "spec": {
            "engineType": "ollama",
            "modelRefs": [
              {
                "name": "gemma3-1b"
              }
            ],
            "replicas": 1,
            "servicePort": 11434
          }
        },
        {
          "apiVersion": "aitrigram.cliver-project.github.io/v1",
          "kind": "LLMEngine",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "aitrigram"
            },
            "name": "vllm-engine"
          },
          "spec": {
            "engineType": "vllm",
            "gpu": {
              "count": 1,
              "enabled": true,
              "type": "nvidia.com/gpu"
            },
            "image": "vllm/vllm-openai:latest",
            "modelRefs": [
              {
                "name": "llama3-7b"
              }
            ],
            "port": 8000,
            "replicas": 1,
            "servicePort": 8000
          }
        },
        {
          "apiVersion": "aitrigram.cliver-project.github.io/v1",
          "kind": "ModelRepository",
          "metadata": {
            "name": "llama3-7b"
          },
          "spec": {
            "autoDownload": true,
            "source": {
              "hfTokenSecret": "huggingface-token",
              "hfTokenSecretKey": "token",
              "modelId": "meta-llama/Llama-3.2-3B-Instruct",
              "origin": "huggingface"
            },
            "storage": {
              "mountPath": "/data/models",
              "size": "50Gi",
              "storageClass": "auto"
            }
          }
        }
      ]
    capabilities: Basic Install
    createdAt: "2026-04-01T13:45:50Z"
    operators.operatorframework.io/builder: operator-sdk-v1.40.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
