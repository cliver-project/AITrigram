name: CI for AITrigram

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "**"

jobs:
  ci-test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      E2E_CONTROLLER_IMG: "ghcr.io/cliver-project/aitrigram-controller:sha-${{ github.sha }}"
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # - name: Run linter
      #   uses: golangci/golangci-lint-action@v6
      #   with:
      #     version: v1.63.4

      - name: Running Tests
        run: |
          go mod tidy
          make all

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (SHA tag for e2e)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.E2E_CONTROLLER_IMG }}

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
          driver: docker
          kubernetes-version: stable

      - name: Running Test e2e
        env:
          E2E_DUMP_LOGS: "true"
        run: |
          go mod tidy
          make test-e2e

      # After e2e passes, promote the image to final tags
      - name: Tag as latest on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SRC: ${{ env.E2E_CONTROLLER_IMG }}
        run: |
          docker buildx imagetools create -t ghcr.io/cliver-project/aitrigram-controller:latest "$SRC"
          docker buildx imagetools create -t "ghcr.io/cliver-project/aitrigram-controller:${{ github.sha }}" "$SRC"

      - name: Extract Docker metadata for tags
        id: meta
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cliver-project/aitrigram-controller
          tags: |
            type=semver,pattern={{version}}

      - name: Tag release version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          SRC: ${{ env.E2E_CONTROLLER_IMG }}
          RELEASE_TAG: ${{ steps.meta.outputs.tags }}
        run: |
          docker buildx imagetools create -t "$RELEASE_TAG" "$SRC"

      - name: Generate install.yaml
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_IMG: ${{ steps.meta.outputs.tags }}
        run: make build-installer IMG="$RELEASE_IMG"

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/install.yaml
