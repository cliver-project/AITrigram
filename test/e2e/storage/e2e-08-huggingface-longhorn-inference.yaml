---
# E2E Test: Full inference test with HuggingFace + Longhorn storage + vLLM (CPU mode)
# This tests:
# 1. ModelRepository deployment with Longhorn StorageClass (auto-detected)
# 2. LLMEngine deployment with vLLM in CPU-only mode
# 3. Inference requests via OpenAI-compatible API

# ModelRepository for a tiny HuggingFace model
apiVersion: aitrigram.cliver-project.github.io/v1
kind: ModelRepository
metadata:
  name: hf-longhorn-inference-test
spec:
  source:
    origin: huggingface
    # Using a tiny test model (~20MB) for fast testing
    modelId: hf-internal-testing/tiny-random-gpt2

  storage:
    size: "5Gi"
    storageClass: "longhorn"
    mountPath: /data/models

  autoDownload: true

---
# LLMEngine for HuggingFace with vLLM (CPU-only mode)
apiVersion: aitrigram.cliver-project.github.io/v1
kind: LLMEngine
metadata:
  name: hf-longhorn-inference-test
  namespace: default
spec:
  engineType: vllm
  modelRefs:
    - name: hf-longhorn-inference-test
  replicas: 1
  servicePort: 8000
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  env:
    - name: VLLM_TARGET_DEVICE
      value: "cpu"
  args:
    - --max-model-len=256
