---
# E2E Test: ModelRepository with local storage for Ollama
# Uses the default StorageClass (e.g., "standard" on minikube)

apiVersion: aitrigram.cliver-project.github.io/v1
kind: ModelRepository
metadata:
  name: ollama-hostpath-test
spec:
  source:
    origin: ollama
    modelId: qwen2.5
    revision: "0.5b"

  storage:
    size: "10Gi"
    storageClass: "auto"
    mountPath: /data/models

  autoDownload: true
