# E2E Test: ModelRepository with Revision Support using PVC
# This test verifies multi-revision model management
apiVersion: aitrigram.cliver-project.github.io/v1
kind: ModelRepository
metadata:
  name: e2e-revision-test
spec:
  source:
    origin: HuggingFace
    modelId: sentence-transformers/all-MiniLM-L6-v2  # Small model for testing

  storage:
    size: "10Gi"  # Enough for 2-3 revisions of small model
    storageClass: "auto"  # Auto-detects and prefers ReadWriteMany storage

  autoDownload: true

  # Test revision management
  revision:
    current: "main"
    updateStrategy: Manual
    revisions:
      - name: "main"
        ref: "main"
        promoted: true
      # Add more revisions for testing if needed

  revisionHistory:
    limit: 2
    retainDays: 7
---
apiVersion: aitrigram.cliver-project.github.io/v1
kind: LLMEngine
metadata:
  name: e2e-revision-engine
  namespace: default
spec:
  engineType: vllm
  modelRefs:
    - name: e2e-revision-test
      revision: "main"
      updatePolicy: Manual

  replicas: 1
  port: 8000
  servicePort: 8080
