apiVersion: aitrigram.cliver-project.github.io/v1
kind: ModelRepository
metadata:
  name: llama3-7b
spec:
  # The modelName is the identifier within all ModelRepositories in the cluster
  # If not specified, defaults to metadata.name (llama3-7b in this example)
  # Uncomment below to override the default:
  # modelName: llama3-model-name-in-repository

  source:
    origin: huggingface   # Options: huggingface | ollama
    modelId: meta-llama/Llama-3.2-3B-Instruct    # Model identifier for the origin
    # For HuggingFace gated models, provide a token secret:
    # The secret should exist in the controller's namespace
    hfTokenSecret: huggingface-token      # Name of the secret
    hfTokenSecretKey: token                # Key in the secret (defaults to "HFToken" if not specified)

  # SIMPLIFIED STORAGE CONFIGURATION
  # The operator will auto-detect and provision the best available storage
  storage:
    # REQUIRED: Storage size
    size: "50Gi"

    # OPTIONAL: Mount path (defaults to /data/models if not specified)
    mountPath: /data/models

    # OPTIONAL: Storage class selection (defaults to "auto" if not specified)
    # - "auto": Operator auto-detects best available storage class
    #   Priority: ReadWriteMany shared storage → Default SC → ReadWriteOnce → HostPath fallback
    # - "<storage-class-name>": Use a specific storage class (e.g., "nfs-client", "longhorn")
    # - "hostpath": Force HostPath storage (development only, single-node)
    storageClass: "auto"

    # Examples of storageClass values:
    # storageClass: "nfs-client"      # Use NFS storage class
    # storageClass: "longhorn"        # Use Longhorn storage class
    # storageClass: "hostpath"        # Force HostPath (development only)
    # storageClass: "auto"            # Let operator choose (default)

  # Auto-download models on creation
  autoDownload: true

  # Optional: Node selector for download job placement
  # Useful for directing downloads to specific nodes with fast storage
  # nodeSelector:
  #   storage: "fast"
  #   zone: "us-west1-a"

  # Optional: Revision management for tracking multiple model versions
  # If not specified, operates in single-revision mode (legacy behavior - downloads to default path)
  # When spec.source.origin is HuggingFace, the default revision is the model's default branch (usually "main")
  # Uncomment to enable explicit multi-revision tracking:
  # revision:
  #   # Current active revision - this is the git ref from the source repository
  #   # For HuggingFace: can be branch name, tag, or commit hash (defaults to "main")
  #   current: "main"
  #
  #   # Update strategy: Manual (default) or Automatic
  #   updateStrategy: Manual
  #
  #   # Auto-promote new downloads to current (default: false)
  #   autoPromote: false
  #
  #   # Track multiple revisions (each downloads to separate directory)
  #   revisions:
  #     - name: "main"           # User-friendly name
  #       ref: "main"            # Git ref from source repo (branch/tag/commit)
  #       promoted: true         # Available for LLMEngine use
  #       autoUpdate: true       # Auto-download new commits
  #       retainAfterSuperseded: true  # Keep for rollback
  #
  # # Optional: Revision history retention policies
  # revisionHistory:
  #   limit: 3           # Max revisions to keep (default: 3)
  #   retainDays: 30     # Delete unused revisions after N days (default: 30)

  # Optional: Specify custom download image (defaults based on origin)
  # downloadImage: python:3.11-slim

  # Optional: Specify custom download scripts with Jinja2 template support
  # The script can be either bash or Python (auto-detected)
  # Available template variables: {{ ModelId }}, {{ ModelName }}, {{ MountPath }}
  # Environment variables are also available via {{ env.VAR_NAME }}

  # Example: Custom Python script
  # downloadScripts: |
  #   #!/usr/bin/env python3
  #   import os
  #   from huggingface_hub import snapshot_download
  #
  #   model_id = "{{ ModelId }}"
  #   target_path = os.path.join("{{ MountPath }}", "{{ ModelName }}")
  #   hf_token = os.environ.get("HF_TOKEN")
  #
  #   print(f"Downloading {model_id} to {target_path}")
  #   snapshot_download(
  #       repo_id=model_id,
  #       local_dir=target_path,
  #       local_dir_use_symlinks=False,
  #       token=hf_token,
  #   )

  # Example: Custom bash script
  # downloadScripts: |
  #   #!/bin/bash
  #   set -e
  #   echo "Downloading model {{ ModelId }}"
  #   mkdir -p {{ MountPath }}/{{ ModelName }}
  #   # Add your custom download logic here

  # Optional: Specify custom delete scripts with Jinja2 template support
  # The script can be either bash or Python (auto-detected)
  # Available template variables: {{ ModelId }}, {{ ModelName }}, {{ MountPath }}
  # Environment variables are also available via {{ env.VAR_NAME }}
  # If not specified, default delete scripts will be used based on origin:
  #   - huggingface: removes model directory
  #   - ollama: runs "ollama rm {{ ModelId }}" then removes directory

  # Example: Custom delete script for Ollama
  # deleteScripts: |
  #   #!/bin/bash
  #   set -e
  #   echo "Deleting Ollama model {{ ModelId }}..."
  #   ollama rm {{ ModelId }} || echo "Model not found in Ollama"
  #   rm -rf {{ MountPath }}/{{ ModelName }}

  # Example: Custom Python delete script
  # deleteScripts: |
  #   #!/usr/bin/env python3
  #   import os
  #   import shutil
  #
  #   model_path = os.path.join("{{ MountPath }}", "{{ ModelName }}")
  #   if os.path.exists(model_path):
  #       shutil.rmtree(model_path)
  #       print(f"Deleted {model_path}")
  #   else:
  #       print(f"{model_path} does not exist")
