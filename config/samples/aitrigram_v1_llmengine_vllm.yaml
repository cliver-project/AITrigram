apiVersion: aitrigram.cliver-project.github.io/v1
kind: LLMEngine
metadata:
  labels:
    app.kubernetes.io/name: aitrigram
    app.kubernetes.io/managed-by: kustomize
  name: vllm-engine
spec:
  engineType: vllm
  modelRefs:
    - name: llama3-7b
  replicas: 1
  servicePort: 8000
  image: "vllm/vllm-openai:latest"
  port: 8000
  gpu:
    enabled: true
    count: 1
    type: "nvidia.com/gpu"
