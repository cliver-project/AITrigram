apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder
  labels:
    app: placeholder
    model: placeholder
    engine-type: ollama
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: placeholder
      model: placeholder
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: placeholder
        model: placeholder
        engine-type: ollama
    spec:
      containers:
      - name: llm-engine
        image: ollama/ollama:latest
        args:
        - serve
        ports:
        - name: http
          containerPort: 11434
          protocol: TCP
        env:
        - name: OLLAMA_HOME
          value: /tmp/ollama-home
        volumeMounts:
        - name: ollama-home
          mountPath: /tmp/ollama-home
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: ollama-home
        emptyDir: {}
      nodeSelector: {}
      tolerations: []
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
